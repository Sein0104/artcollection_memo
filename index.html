<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ArtCatch 컬렉션</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#scan" aria-label="ArtCatch 홈">
        <span class="brand-mark">A</span>
        <span>
          <strong>ArtCatch</strong>
          <small>컬렉션</small>
        </span>
      </a>
      <nav class="nav-links" aria-label="주요 메뉴">
        <a href="#scan" data-route-link="scan">추천</a>
        <a href="#collection" data-route-link="collection">내 컬렉션</a>
        <a href="#community" data-route-link="community">게시판</a>
      </nav>
      <div class="auth-area" id="authArea"></div>
    </header>

    <main>
      <section class="status-strip" aria-label="내 상태">
        <div>
          <span class="label">칭호</span>
          <strong id="titleBadge">새내기 감상가</strong>
        </div>
        <div>
          <span class="label">포인트</span>
          <strong id="pointTotal">0P</strong>
        </div>
        <div>
          <span class="label">수집</span>
          <strong id="collectionCount">0점</strong>
        </div>
        <div>
          <span class="label">설치 작품</span>
          <strong id="installedRewardName">없음</strong>
        </div>
      </section>

      <section class="app-page" id="scanPage" data-page="scan">
        <div class="page-title">
          <span class="eyebrow">SCAN</span>
          <h1>사진과 닮은 작품 찾기</h1>
        </div>

        <section class="workspace" id="scanner">
          <div class="scanner-panel">
            <div class="scanner-grid">
              <div class="photo-drop">
                <input
                  type="file"
                  id="photoInput"
                  accept="image/*"
                  capture="environment"
                />
                <label for="photoInput" class="photo-trigger">
                  <span class="camera-symbol" aria-hidden="true"></span>
                  <strong>사진 선택</strong>
                  <small>카메라 또는 갤러리</small>
                </label>
                <div class="preview-frame" id="previewFrame">
                  <span>미리보기</span>
                </div>
              </div>
              <div class="analysis-box">
                <span class="label">분석</span>
                <h2 id="analysisTitle">사진을 기다리는 중</h2>
                <p id="analysisCopy">색감과 분위기가 가까운 작품을 추천합니다.</p>
                <div class="swatch-row" id="scanSwatches"></div>
              </div>
            </div>
            <div class="results-grid" id="recommendations"></div>
          </div>

          <aside class="mission-panel" id="missions">
            <div class="section-heading">
              <span class="eyebrow">DAILY</span>
              <h2>오늘의 미션</h2>
            </div>
            <div id="dailyMission"></div>
            <div class="mission-log">
              <div class="compact-heading">
                <span class="label">미션 컬렉션</span>
                <strong id="missionCount">0점</strong>
              </div>
              <div id="missionCollectionMini" class="mini-list"></div>
            </div>
          </aside>
        </section>

        <section class="catalog-section">
          <div class="section-heading">
            <span class="eyebrow">TAGS</span>
            <h2>작품 분류</h2>
          </div>
          <div class="filter-bar" id="filterBar"></div>
          <div class="catalog-grid" id="catalogGrid"></div>
        </section>

        <section class="reward-section">
          <div class="section-heading">
            <span class="eyebrow">POINT SHOP</span>
            <h2>포인트 전용 작품</h2>
          </div>
          <div class="reward-grid" id="rewardGrid"></div>
        </section>
      </section>

      <section class="app-page" id="collectionPage" data-page="collection">
        <div class="page-title">
          <span class="eyebrow">COLLECTION</span>
          <h1>내 컬렉션</h1>
        </div>
        <div class="collection-stage" id="collectionStage">
          <div class="collection-tabs" id="collectionTabs"></div>
          <div class="collection-grid" id="collectionGrid"></div>
        </div>
      </section>

      <section class="app-page" id="communityPage" data-page="community">
        <div class="page-title board-title">
          <div>
            <span class="eyebrow">BOARD</span>
            <h1>커뮤니티</h1>
          </div>
          <button class="ghost-button" data-action="toggle-board-search" type="button">검색</button>
        </div>

        <div class="board-search-panel" id="boardSearchPanel" hidden>
          <form class="board-search-form" id="boardSearchForm">
            <input
              type="search"
              id="boardSearchInput"
              placeholder="제목, 내용, 작품명 검색"
              aria-label="게시글 검색"
            />
            <select id="boardSearchMuseum" aria-label="미술관 검색 옵션"></select>
            <button type="submit">검색</button>
          </form>
        </div>

        <div class="community-feed">
          <form class="post-form" id="postForm">
            <input
              type="text"
              id="postTitle"
              maxlength="36"
              placeholder="게시글 제목"
              required
            />
            <textarea
              id="postBody"
              rows="4"
              maxlength="240"
              placeholder="작품이나 미술관에 대한 생각"
              required
            ></textarea>
            <div class="form-row">
              <select id="postMuseum" aria-label="미술관 태그"></select>
              <select id="postArtwork" aria-label="작품 태그"></select>
              <button type="submit">공유</button>
            </div>
          </form>
          <div class="board-filter-summary" id="boardFilterSummary"></div>
          <div class="post-list" id="postList"></div>
        </div>
      </section>

      <section class="app-page auth-page" id="loginPage" data-page="login">
        <div class="auth-card">
          <div class="page-title">
            <span class="eyebrow">LOGIN</span>
            <h1>로그인</h1>
          </div>
          <form class="auth-form" id="loginForm">
            <label>
              <span>닉네임</span>
              <input id="loginNickname" type="text" maxlength="7" autocomplete="username" required />
            </label>
            <label>
              <span>비밀번호</span>
              <input id="loginPassword" type="password" minlength="4" maxlength="64" autocomplete="current-password" required />
            </label>
            <button type="submit">로그인</button>
          </form>
          <p class="auth-switch">계정이 없다면 <a href="#signup">회원가입</a></p>
        </div>
      </section>

      <section class="app-page auth-page" id="signupPage" data-page="signup">
        <div class="auth-card">
          <div class="page-title">
            <span class="eyebrow">SIGN UP</span>
            <h1>회원가입</h1>
          </div>
          <form class="auth-form" id="signupForm">
            <label>
              <span>닉네임</span>
              <input id="signupNickname" type="text" maxlength="7" autocomplete="username" required />
            </label>
            <label>
              <span>비밀번호</span>
              <input id="signupPassword" type="password" minlength="4" maxlength="64" autocomplete="new-password" required />
            </label>
            <button type="submit">가입하기</button>
          </form>
          <p class="auth-switch">이미 계정이 있다면 <a href="#login">로그인</a></p>
        </div>
      </section>
    </main>

    <div class="image-modal" id="imageModal" aria-hidden="true">
      <div class="image-modal-backdrop" data-action="close-image"></div>
      <div class="image-modal-panel" role="dialog" aria-modal="true" aria-labelledby="imageModalTitle">
        <button class="modal-close" data-action="close-image" aria-label="닫기">×</button>
        <img id="imageModalImg" alt="" />
        <div>
          <h2 id="imageModalTitle"></h2>
          <p id="imageModalMeta"></p>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
