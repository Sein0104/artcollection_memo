services:
  postgres:
    image: postgres:16-alpine
    container_name: artcatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: artcatch
      POSTGRES_PASSWORD: artcatch
      POSTGRES_DB: artcatch
    ports:
      - "5432:5432"
    volumes:
      - artcatch-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artcatch -d artcatch"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  artcatch-postgres-data:
